<svg xmlns="http://www.w3.org/2000/svg" width="160" height="64" viewBox="0 0 160 64">
  <defs>
    <linearGradient id="colab-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E0F" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="160" height="64" rx="12" fill="url(#colab-grad)" filter="url(#shadow)"/>
  
  <!-- Colab infinity logo shape -->
  <g transform="translate(24, 10)">
    <path d="M0,7 C-2,3 -5,1 -8,1 C-12,1 -15,5 -15,9 C-15,13 -12,17 -8,17 C-5,17 -2,15 0,11" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,7 C2,3 5,1 8,1 C12,1 15,5 15,9 C15,13 12,17 8,17 C5,17 2,15 0,11" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-8" cy="9" r="2" fill="#FFFFFF"/>
    <circle cx="8" cy="9" r="2" fill="#FFFFFF"/>
  </g>
  
  <text x="76" y="24" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF" letter-spacing="1">COLAB</text>
  <text x="80" y="47" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="800" font-size="11" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">OPEN NOTEBOOK</text>
</svg>
